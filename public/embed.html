  <head>
    <meta charset="utf-8" />

    <style>
      body { font-family: system-ui, -apple-system, Arial, sans-serif; max-width: 800px; margin: 60px auto; padding: 0 20px; background-color: #dcefc8; border-color: 1px solid #212121; }

      .logo { width: 10px; height: 10px; border-radius: 50%; background: #dcefc8; display: grid; place-items: center; font-weight: 700; }
      .messages { height: 420px; overflow: auto; border: 1px solid #eee; border-radius: 10px; padding: 12px; background: #fafafa; }
      .msg { padding: 10px 12px; border-radius: 12px; margin: 8px 0; max-width: 80%; line-height: 1.35; }
      .user { background: #849a6b; margin-left: auto; }
      .bot  { background: #fff; border: 1px solid #eee; }
      .composer { display: flex; gap: 8px; margin-top: 12px; }
      input, select, button { padding: 10px 12px; border-radius: 10px; border: 1px solid #ddd; }
      button { cursor: pointer; background: #849a6b; color:#000; }
      .test-btn { background: #fff !important; color: #000 !important; }
      .test-btn.selected { background: #2a7c3f !important; color: #fff !important; border-color: #2a7c3f !important; }
      img { height: 80px; }
      #backBtn { position: fixed; bottom: 20px; left: 20px; background: #fff; border: 2px solid #000; border-radius: 12px; padding: 8px 14px; font-size: 14px; color: #000; text-decoration: none; box-shadow: 0 2px 6px rgba(0,0,0,0.2); transition: background 0.2s ease; z-index: 9999; } 

       #backBtn:hover { background: #2a7c3f; color: #fff; border-color: #2a7c3f; }
.chat-msg { border:1px solid #eee; border-radius:14px; padding:10px 12px; margin:8px 0; line-height:1.4; background:#fff; }
.chat-msg.user { background:#f7f7f7; }
.chat-msg.assistant { background:#fff; }
.chat-msg h4 { margin:4px 0 6px; font-size:14px; }
.chat-msg ul { margin:6px 0 0 1.2em; padding:0; }
.chat-msg li { margin:4px 0; }
.suggestions { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
.suggestions button { border:2px solid #6e6e6e; background:#fff; border-radius:999px; padding:6px 10px; cursor:pointer; font-size:12px; }
.suggestions button:hover { background:#2a7c3f; color:#fff; border-color:#2a7c3f; }
.product-card { border:1px solid #6e6e6e; border-radius:12px; padding:8px 10px; margin-top:8px; background:#fafafa; }
#send {
  width: 54px;
  height: 42px;
  padding: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: #849a6b;
  color: #fff;
  border: 1px solid #7b9163;
  border-radius: 12px;
  cursor: pointer;
}

#send svg {
  width: 28px;
  height: 28px;
  fill: currentColor;
  display: block;
}

#send:hover {
  filter: brightness(0.96);
}

  <body>
    <div class="app">
      <div class="header">
  <div>
    <img src="logo-sabores.png" alt="logo">
  </div>
  <div>
    <strong id="titleText">Asistente de Sabores del Guijo Casa Alonso</strong><br>
    <small id="createdBy">Creado por: Triangle AI</small>
  </div>
  <div style="margin-left:auto">
    <label id="langLabel">Idioma:
      <select id="lang">
        <option value="español">Español</option>
        <option value="inglés">English</option>
      </select>
    </label>
  </div>
</div>

      <div id="messages" class="messages"></div>

      <div class="composer">
       <input id="input" placeholder="Escribe tu mensaje..." style="flex:1" />
      <button id="send" aria-label="Enviar mensaje" title="Enviar">
  <svg viewBox="0 0 24 24" aria-hidden="true">
    <path d="M3 20L21 12L3 4L3 10L15 12L3 14L3 20Z"></path>
  </svg>
</button>
      </div>
    </div>

    <script>
      const $messages = document.getElementById('messages');
      const $input = document.getElementById('input');
      const $send = document.getElementById('send');
      const $lang = document.getElementById('lang');




      const history = []; // {role:'user'|'assistant', content:string}

      function addMessage(content, who) {
        const div = document.createElement('div');
        div.className = 'msg ' + (who === 'user' ? 'user' : 'bot');
        div.textContent = content;
        $messages.appendChild(div);
        $messages.scrollTop = $messages.scrollHeight;
      }

      async function sendMessage() {
        const text = $input.value.trim();
        if (!text) return;
        addMessage(text, 'user');
        history.push({ role: 'user', content: text });
        $input.value = '';

        addMessage(i18n[getLang()].thinking, 'assistant');
        const thinkingBubble = $messages.lastChild;

        try {
          console.log("Enviando mensaje:", { messages: history, language: $lang.value });

          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: history, language: $lang.value })
          });
          const data = await res.json();
          console.log("Respuesta recibida:", data);
          thinkingBubble.remove();
          addAssistantMessage(data.reply || 'Lo siento, hemos tenido un error. Intente más tarde, o pruebe llamando al 927 56 02 92. Gracias por su paciencia.');
          history.push({ role: 'assistant', content: data.reply || '' });
        } catch (err) {
          thinkingBubble.remove();
          addMessage('Error de red o del servidor: ' + err.message, 'assistant');
        }
      }

      $send.addEventListener('click', sendMessage);
      $input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendMessage();
      });

      // Mensaje de bienvenida
       const i18n = {
  'español': {
    welcome: '¡Hola! Soy el asistente de Sabores del Guijo Casa Alonso. ¿En qué puedo ayudarle?',
    placeholder: 'Escribe tu mensaje...',
    sendBtn: 'Enviar',
    thinking: 'Pensando…',
    error: 'Lo siento, hemos tenido un error. Intente más tarde, o pruebe llamando al 927 56 02 92.',
    title: 'Asistente de Sabores del Guijo Casa Alonso',
    createdBy: 'Creado por: Triangle AI',
    langLabel: 'Idioma:',
    backBtn: '⬅ Volver a la tienda',
  },
  'inglés': {
    welcome: 'Hello! I\'m the assistant of Sabores del Guijo Casa Alonso. How can I help you?',
    placeholder: 'Type your message...',
    sendBtn: 'Send',
    thinking: 'Thinking…',
    error: 'Sorry, we had an error. Please try again later or call us at +34 927 56 02 92.',
    title: 'Assistant of Sabores del Guijo Casa Alonso',
    createdBy: 'Created by: Triangle AI',
    langLabel: 'Language:',
    backBtn: '⬅ Back to the shop',
  }
};

      function getLang() {
        return $lang.value === 'inglés' ? 'inglés' : 'español';
      }

      function applyLanguage() {
  const t = i18n[getLang()];
  $input.placeholder = t.placeholder;

  document.getElementById('titleText').textContent = t.title;
  document.getElementById('createdBy').textContent = t.createdBy;
  document.getElementById('langLabel').childNodes[0].textContent = t.langLabel;
  document.getElementById('backBtnText').textContent = t.backBtn;
}

      // Mensaje de bienvenida
      function showWelcome() {
        $messages.innerHTML = ''; // limpia mensajes anteriores
        addMessage(i18n[getLang()].welcome, 'assistant');
      }

      // Cuando cambia el idioma, actualiza la interfaz
      $lang.addEventListener('change', () => {
        applyLanguage();
        showWelcome();
      });

      // Arranque inicial
      

    </script>
    <a href="https://tienda.casa-alonso.es/" id="backBtn"><span id="backBtnText">⬅ Volver a la tienda</span></a>
    <script>
function escapeHtml(s){ return s.replace(/[&<>"]/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c])); }

// Detecta si el mensaje es el test de mermelada perfecta
function esMermeladaTest(text) {
  const lineasConOpciones = text.split('\n').filter(l => l.includes('|') && !l.includes('Después'));
  return lineasConOpciones.length >= 3 && !text.includes('mermelada perfecta es');
}

// Estado del test
let testRespuestas = {};
let testPreguntas = [];

function renderTest(text) {
  const div = document.createElement('div');
  div.className = 'chat-msg assistant';

  // Extraer preguntas y opciones del texto
  const lineas = text.split('\n').map(l => l.trim()).filter(Boolean);
  let intro = '';
  const preguntas = [];

  for (const l of lineas) {
    if (l.startsWith('•') || l.startsWith('-')) {
      const partes = l.slice(1).trim().split('?');
      if (partes.length >= 2) {
        const pregunta = partes[0].trim() + '?';
        const opciones = partes[1].split('|').map(o => o.trim()).filter(Boolean);
        preguntas.push({ pregunta, opciones });
      }
    } else if (!intro) {
      intro = l;
    }
  }

  testPreguntas = preguntas;
  testRespuestas = {};

  let html = `<div style="margin-bottom:12px">${escapeHtml(intro)}</div>`;

  preguntas.forEach((p, i) => {
    html += `<div style="margin-bottom:12px">`;
    html += `<div style="font-size:13px; font-weight:600; margin-bottom:6px; color:#333">${escapeHtml(p.pregunta)}</div>`;
    html += `<div style="display:flex; gap:6px; flex-wrap:wrap">`;
    p.opciones.forEach(op => {
      html += `<button type="button" class="test-btn" data-pregunta="${i}" data-opcion="${escapeHtml(op)}" 
        style="border:1.5px solid #6e6e6e; background:#fff; border-radius:999px; padding:6px 12px; cursor:pointer; font-size:12px;">
        ${escapeHtml(op)}
      </button>`;
    });
    html += `</div></div>`;
  });

  html += `<button type="button" id="btnEnviarTest" disabled
    style="margin-top:10px; background:#849a6b; color:#fff; border:none; border-radius:10px; padding:10px 20px; cursor:not-allowed; opacity:0.5; font-size:14px; width:100%">
    Encontrar mi mermelada perfecta 🍓
  </button>`;

  div.innerHTML = html;

  // Lógica de selección
  div.querySelectorAll('.test-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = btn.getAttribute('data-pregunta');
      const op = btn.getAttribute('data-opcion');

      // Deseleccionar otros botones de la misma pregunta
      div.querySelectorAll(`.test-btn[data-pregunta="${idx}"]`).forEach(b => {
        b.style.background = '#fff';
        b.style.color = '#000';
        b.style.borderColor = '#6e6e6e';
      });

      // Seleccionar este
      btn.style.background = '#2a7c3f';
      btn.style.color = '#fff';
      btn.style.borderColor = '#2a7c3f';
       btn.classList.add('selected');

      testRespuestas[idx] = op;

      // Activar botón si están todas respondidas
      const btnEnviar = div.querySelector('#btnEnviarTest');
      if (Object.keys(testRespuestas).length === preguntas.length) {
        btnEnviar.disabled = false;
        btnEnviar.style.cursor = 'pointer';
        btnEnviar.style.opacity = '1';
      }
    });
  });

  // Enviar cuando pulse el botón final
  div.querySelector('#btnEnviarTest').addEventListener('click', () => {
    const resumen = preguntas.map((p, i) => `${p.pregunta} ${testRespuestas[i]}`).join('. ');
    const mensaje = `Mis respuestas: ${resumen}`;
    addMessage(mensaje, 'user');
    sendTextToChat(mensaje);
  });

  return div;
}

// Convierte texto con bullets y secciones a HTML simple
function renderAssistant(text){
  const div = document.createElement('div');
  div.className = 'chat-msg assistant';

  // separar sugerencias (última línea "Sugerencias: a | b | c")
  let sugg = [];
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const rest = [];
for (const l of lines) {
 if (l.toLowerCase().startsWith('sugerencias:') || l.toLowerCase().startsWith('suggestions:')) {
    const raw = l.split(':').slice(1).join(':').trim();
    sugg = raw.split('|').map(s => s.trim()).filter(Boolean);
  } else {
    rest.push(l);
  }
}
  // detectar "Recomendación:"
  let recHtml = '';
  const rest2 = [];
  for (const l of rest) {
  if (l.toLowerCase().startsWith('recomendacion:') || l.toLowerCase().startsWith('recomendación:') || l.toLowerCase().startsWith('recommendation:')) {
    const content = escapeHtml(l.split(':').slice(1).join(':').trim());
   const recLabel = getLang() === 'inglés' ? 'Recommendation:' : 'Recomendación:';
recHtml += `<div class="product-card"><strong>${recLabel}</strong> ${content}</div>`;
  } else {
    rest2.push(l);
  }
}

  // primera línea como resumen, resto como bullets si empiezan con "•"
  const first = escapeHtml(rest2[0] || '');
  const bodyLines = rest2.slice(1);

  let html = '';
  if (first) html += `<div>${first}</div>`;

  const bullets = bodyLines.filter(l => l.startsWith('•'));
  const others  = bodyLines.filter(l => !l.startsWith('•'));

  if (bullets.length){
    html += '<ul>' + bullets.map(b => `<li>${escapeHtml(b.slice(1).trim())}</li>`).join('') + '</ul>';
  }
  if (others.length){
    html += others.map(o => `<div>${escapeHtml(o)}</div>`).join('');
  }
  if (recHtml) html += recHtml;

  // sugerencias -> botones
  if (sugg.length){
    html += '<div class="suggestions">' + sugg.map(s => `<button type="button" data-sug="${escapeHtml(s)}">${escapeHtml(s)}</button>`).join('') + '</div>';
  }

  div.innerHTML = html;

  // Click en sugerencias: envía el texto del botón como nuevo mensaje del usuario
  div.querySelectorAll('.suggestions button').forEach(btn => {
    btn.addEventListener('click', () => {
      const t = btn.getAttribute('data-sug');
      // aquí llama a tu función existente que envía un mensaje del usuario:
      sendQuick(t);
    });
  });

  return div;
}

// Envía un mensaje de usuario desde una sugerencia
function sendQuick(text){
  // Añadir contexto del último mensaje del bot para mantener la conversación
  const lastBotMsg = [...$messages.querySelectorAll('.chat-msg.assistant')].at(-1);
  const contexto = lastBotMsg ? lastBotMsg.innerText.slice(0, 200) : '';
  const textConContexto = contexto ? `[Contexto de la conversación: ${contexto}]\n${text}` : text;
  addMessage(text, 'user');
  sendTextToChat(textConContexto);
}

// Ejemplo: si tu función original esperaba leer de un input, extrae el POST a esta
async function sendTextToChat(text){
  history.push({ role:'user', content: text });

  addMessage(i18n[getLang()].thinking, 'assistant');
  const thinkingBubble = $messages.lastChild;

  const timeout = new Promise((_, reject) =>
    setTimeout(() => reject(new Error('timeout')), 15000)
  );

  try {
    const fetchPromise = fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        sessionId: localStorage.getItem('sg_session') || 'anon',
        language: $lang.value,
        messages: [...history]
      })
    });

    const res = await Promise.race([fetchPromise, timeout]);
    const data = await res.json();
    thinkingBubble.remove();
    addAssistantMessage(data.reply || i18n[getLang()].error);
    history.push({ role:'assistant', content: data.reply || '' });
  } catch (err) {
    thinkingBubble.remove();
    if (err.message === 'timeout') {
      addMessage(i18n[getLang()].error, 'assistant');
    } else {
      addMessage('Error de red: ' + err.message, 'assistant');
    }
  }
}
// Envoltorios para añadir mensajes al chat
function addAssistantMessage(text){
  const container = document.getElementById('messages');
  const el = esMermeladaTest(text) ? renderTest(text) : renderAssistant(text);
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}
</script>

<script>
  // Arranque inicial — va aquí al final para que todo esté cargado
  document.getElementById('lang').value = 'español';
  applyLanguage();
  showWelcome();
</script>
